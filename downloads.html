<!DOCTYPE html>
<html lang="en">
<head>
    <title>BCPY-Downloads</title>
    <link rel="stylesheet" href="MainCss/style.css">
</head>
<body>
    <div class="navbar">
        <button id="homebtn" class="navbtn">HOME</button>
        <button id="downloadbtn" class="navbtn">DOWNLOADS</button>
    </div>
    <div class="downloadbody">
        <h3>INSTALLATION</h3>
        <textarea readonly class="installation" id="downloadtext" rows="3" cols="60">$ git clone https://github.com/bcbro2021/bcpy-package-manager.git
$ cd bcpy-package-manager
$ ./setup.sh</textarea>
        <h3>Usage</h3>
        <textarea readonly class="usage" id="downloadtext" rows="1" cols="60">$ bcpy <function> <package-name> <directory></textarea>
        <h4>FUNCTIONS</h4>
        <textarea readonly class="functions" id="downloadtext" rows="2" cols="60">install :- installs a package from <directory>
remove :- removes a package from <directory></textarea>
        <h4>DIRECTORY</h4>
        <textarea readonly class="directory" id="downloadtext" rows="7" cols="60">example: $bcpy install margray_2d /home/<your-username>/projects/python/game/

or

example: $bcpy install margray_2d global (global :- saves to the default python package directory)</textarea>
        <h3>MORE INFO AND SOURCE CODE</h3>
        <button id="gitbtn">Bcbro2021 on github</button>
        <br>
    </div>
    <script src="src/main.js"></script>

</body>
</html>
